name: melonab
description: "A new Flutter project."
publish_to: 'none'

version: 0.0.9+0

environment:
  sdk: ^3.10.0

dependencies:
  audio_video_progress_bar: ^2.0.3
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_gen: ^5.12.0
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  get: ^4.7.3
  just_audio: ^0.9.46
  just_audio_background: ^0.0.1-beta.17
  lottie: ^3.3.2
  marquee: ^2.3.0
  on_audio_query: ^2.9.0
  permission_handler: ^11.4.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    # PNG assets
    - assets/img/melonab_logo.png
    - assets/icons/app_icon.png

    # Icon Assets
    - assets/icons/music.png
    - assets/icons/home.png
    - assets/icons/settings.png
    - assets/icons/Menu.png
    - assets/icons/podcast.png
    - assets/icons/album.png
    - assets/icons/submit_nazar.png
    - assets/icons/share.png

    # Svg Assets
    - assets/svg/search.svg
    - assets/svg/dual_music_note.svg
    - assets/svg/music_note.svg
    - assets/svg/heart_mis_broke.svg
    - assets/svg/Menu.svg
    - assets/svg/checklist.svg
    - assets/svg/sort.svg

    # json assets
    - assets/animations/loading.json
    - assets/animations/music_spaceman.json
    - assets/animations/music_volume_white.json

  fonts:
    - family: YekanBakh
      fonts:
        - asset: assets/fonts/YekanBakhFaNum-Black.ttf
          weight: 900
        - asset: assets/fonts/YekanBakhFaNum-Bold.ttf
          weight: 700
        - asset: assets/fonts/YekanBakhFaNum-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/YekanBakhFaNum-Regular.ttf
          weight: 400
        - asset: assets/fonts/YekanBakhFaNum-Light.ttf
          weight: 300
        - asset: assets/fonts/YekanBakhFaNum-Thin.ttf
          weight: 100
